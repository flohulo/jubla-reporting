version: 2
updates:
  # 1. Überprüfung der npm-Pakete
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      npm-dependencies:
        patterns:
          - "*"
    commit-message:
      prefix: "chore"

  # 2. Überprüfung von GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    groups:
      action-dependencies:
        patterns:
          - "*"
    commit-message:
      prefix: "chore"
