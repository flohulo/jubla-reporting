name: "Check PR Title"

on:
  pull_request:
    types: [opened, edited, synchronize]

jobs:
  check-title:
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR title
        uses: actions/github-script@v7
        with:
          script: |
            const title = context.payload.pull_request.title;
            // Definition der erlaubten Conventional Commit Typen
            const types = [
              'feat',     // Neue Features
              'fix',      // Bugfixes
              'chore',    // Wartungsarbeiten
              'docs',     // Dokumentation
              'style',    // Formatierung, Semikolons, etc.
              'refactor', // Code-Strukturänderung ohne Fix/Feature
              'perf',     // Performance-Verbesserung
              'test',     // Tests hinzufügen/ändern
              'ci',       // CI-Konfiguration
              'build'     // Build-System (z.B. npm, webpack)
            ];
            
            const regex = new RegExp(`^(${types.join('|')})(\\(.*\\))?!?:\\s.+`);

            if (!regex.test(title)) {
              core.setFailed(
                `❌ PR-Titel ist nicht standardkonform! 🛑\n\n` +
                `Wir nutzen Conventional Commits. Dein Titel muss mit einem der folgenden Begriffe starten:\n` +
                `${types.join(', ')}\n\n` +
                `Beispiel: "feat: Add user authentication" oder "fix(ui): Navbar alignment"\n` +
                `Siehe: https://www.conventionalcommits.org/`
              );
            } else {
              console.log('✅ PR-Titel sieht super aus! 🎉');
            }
