name: Quality Gate

on:
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # 1. Prüft HTML auf Fehler
      - name: HTML Lint
        run: npx htmlhint "**/*.html"

      # 2. Prüft CSS auf Fehler
      - name: CSS Lint
        run: npx stylelint "**/*.css" --allow-empty-input

      # 3. Formatiert den Code einheitlich (Prettier)
      - name: Check Formatting
        run: npx prettier --check .
